<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}corrode Rust Course{% endblock %}</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            /* ---------- Local fonts (served from /static/fonts) ---------- */
            @font-face {
                font-family: "Happy Headline";
                src: url("/static/fonts/Happy-Headline.woff2") format("woff2");
                font-weight: 400 900;
                font-style: normal;
                font-display: swap;
            }
            @font-face {
                font-family: "JetBrains Mono";
                src: url("/static/fonts/JetBrainsMono-Regular.woff2")
                    format("woff2");
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }
            /* ---------- Theme tokens ---------- */
            :root {
                /* GitHub Primer (light) */
                --color-background: #ffffff;
                --color-surface: #f6f8fa;
                --color-primary: #0969da;
                --color-primary-muted: #0550ae;
                --color-primary-rgb: 9, 105, 218;
                --color-text: #1f2328;
                --color-text-muted: #59636e;
                --color-border: #d1d9e0;
                --color-input-bg: #ffffff;
                --color-input-border: #d1d9e0;
                --color-success: #1a7f37;
                --color-warning: #9a6700;
                --color-error: #d1242f;
                --logo-filter: invert(0%);
                /* Syntax highlight palette, shared by chapter prose code
                   blocks and the in-page CodeMirror editor. */
                --syn-keyword: #cf222e;
                --syn-type: #953800;
                --syn-string: #0a3069;
                --syn-number: #0550ae;
                --syn-definition: #8250df;
                --syn-macro: #116329;
                --syn-comment: #6e7781;
                --syn-punctuation: #57606a;
                --syn-invalid: #cf222e;
                --syn-bg: #f6f8fa;
                --syn-fg: #1f2328;
                --syn-cursor: #1f2328;
                --syn-selection-bg: #b4d5fe;
                --syn-gutter-bg: #f6f8fa;
                --syn-gutter-fg: #59636e;
                --syn-active-line: #eaeef2;
            }

            html[data-theme="dark"] {
                /* GitHub Primer (dark) */
                --color-background: #0d1117;
                --color-surface: #151b23;
                --color-primary: #4493f8;
                --color-primary-muted: #1f6feb;
                --color-primary-rgb: 68, 147, 248;
                --color-text: #f0f6fc;
                --color-text-muted: #9198a1;
                --color-border: #3d444d;
                --color-input-bg: #0d1117;
                --color-input-border: #3d444d;
                --color-success: #3fb950;
                --color-warning: #d29922;
                --color-error: #f85149;
                --logo-filter: invert(100%);
                --syn-keyword: #cba6f7;
                --syn-type: #f9e2af;
                --syn-string: #a6e3a1;
                --syn-number: #fab387;
                --syn-definition: #89b4fa;
                --syn-macro: #f5c2e7;
                --syn-comment: #6c7086;
                --syn-punctuation: #94a3b8;
                --syn-invalid: #f38ba8;
                --syn-bg: #1e1e2e;
                --syn-fg: #cdd6f4;
                --syn-cursor: #cdd6f4;
                --syn-selection-bg: #45475a;
                --syn-gutter-bg: #1e1e2e;
                --syn-gutter-fg: #6c7086;
                --syn-active-line: #2a2b3c;
            }

            /* ---------- Reset ---------- */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    "Helvetica Neue",
                    sans-serif;
                background-color: var(--color-background);
                color: var(--color-text);
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            h1,
            .header h1,
            .exercise-title {
                font-family:
                    "Happy Headline",
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                letter-spacing: -0.01em;
            }

            h2,
            h3,
            h4,
            h5,
            h6 {
                /* Sub-headlines stay in the body face so they read as section
                   labels rather than competing with the page title. */
                font-family: inherit;
                letter-spacing: -0.005em;
            }

            code,
            pre,
            kbd,
            samp,
            .cm-editor,
            .cm-content,
            .code-block {
                font-family:
                    "JetBrains Mono", "SF Mono", Monaco, Menlo, Consolas,
                    monospace;
            }

            /* ---------- Layout ---------- */
            .container {
                width: 100%;
                max-width: 1100px;
                margin: 0 auto;
                padding: 1.5rem 1.5rem 4rem;
                flex: 1 0 auto;
            }

            .header {
                text-align: center;
                margin-bottom: 3rem;
            }
            .header h1 {
                font-size: 2.5rem;
                font-weight: 700;
                letter-spacing: -0.01em;
                color: var(--color-text);
                margin-bottom: 0.5rem;
            }
            .header p {
                font-size: 1.05rem;
                color: var(--color-text-muted);
            }

            /* ---------- Cards / forms / buttons (used by other pages) ---------- */
            .card {
                background-color: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 8px;
                padding: 1.5rem;
                margin-bottom: 1.25rem;
            }
            .form-group {
                margin-bottom: 1.25rem;
            }
            .form-group label {
                display: block;
                margin-bottom: 0.4rem;
                font-weight: 600;
                color: var(--color-text);
            }
            .form-control {
                width: 100%;
                padding: 0.7rem 1rem;
                background-color: var(--color-input-bg);
                border: 1px solid var(--color-input-border);
                border-radius: 6px;
                color: var(--color-text);
                font-size: 1rem;
            }
            .form-control:focus {
                outline: none;
                border-color: var(--color-primary);
            }
            .form-control::placeholder {
                color: var(--color-text-muted);
            }

            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 0.4rem;
                height: 2.25rem;
                padding: 0 0.95rem;
                background-color: var(--color-primary);
                color: #fff;
                text-decoration: none;
                border: 1px solid var(--color-primary);
                border-radius: 6px;
                font-family: inherit;
                font-size: 0.9rem;
                font-weight: 600;
                line-height: 1;
                white-space: nowrap;
                cursor: pointer;
                box-sizing: border-box;
            }
            .btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            .btn:hover {
                background-color: var(--color-primary-muted);
            }
            .btn-secondary {
                background-color: var(--color-surface);
                color: var(--color-text);
                border: 1px solid var(--color-border);
            }
            .btn-secondary:hover {
                background-color: var(--color-background);
                border-color: var(--color-text-muted);
                color: var(--color-text);
            }
            .btn-success {
                background-color: var(--color-success);
                border-color: var(--color-success);
                color: #fff;
            }
            .btn-success:hover {
                /* Slight darken on hover; falls back to filter so we don't
                   need a separate token per theme. */
                filter: brightness(0.92);
            }

            .exercise-list {
                display: grid;
            }
            .exercise-item {
                display: flex;
                align-items: center;
                padding: 1rem;
                background-color: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 6px;
            }
            .exercise-item:hover {
                border-color: var(--color-primary);
            }
            .exercise-status {
                font-size: 1.25rem;
                margin-right: 1rem;
            }
            .exercise-name {
                font-weight: 500;
                color: var(--color-text);
                font-family: "SF Mono", Monaco, monospace;
            }
            .status-completed {
                color: var(--color-success);
            }
            .status-perfected {
                color: var(--color-warning);
            }
            .status-pending {
                color: var(--color-text-muted);
            }

            .stats {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 1rem;
                margin-bottom: 1.5rem;
            }
            .stat-card {
                text-align: center;
                padding: 1rem;
                background-color: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 8px;
            }
            .stat-number {
                font-size: 1.75rem;
                font-weight: 700;
                color: var(--color-primary);
                display: block;
            }
            .stat-label {
                color: var(--color-text-muted);
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .admin-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 1rem;
            }
            .admin-table th,
            .admin-table td {
                padding: 0.6rem 0.75rem;
                text-align: left;
                border-bottom: 1px solid var(--color-border);
            }
            .admin-table th {
                background-color: var(--color-surface);
                font-weight: 600;
                color: var(--color-text);
            }
            .admin-table td {
                color: var(--color-text-muted);
            }

            .code-block {
                background-color: #1e1e2e;
                color: #cdd6f4;
                border: 1px solid #313244;
                border-radius: 12px;
                padding: 1rem;
                margin: 1rem 0;
                overflow-x: auto;
                font-family: "SF Mono", Monaco, monospace;
                font-size: 0.875rem;
                line-height: 1.5;
            }

            /* ---------- Top bar / brand (kept for non-exercise pages) ---------- */
            .nav {
                /* Per-page in-content nav blocks are superseded by the
                   global fixed top bar below. Keep the rule for backwards
                   compatibility, but hide the markup wherever it appears. */
                display: none !important;
            }

            /* ---------- Global sticky top bar ---------- */
            .topbar {
                position: sticky;
                top: 0;
                z-index: 900;
                height: 3rem;
                background: var(--color-background);
                border-bottom: 1px solid var(--color-border);
                display: flex;
                align-items: center;
                padding: 0 1.5rem;
            }
            .topbar-inner {
                width: 100%;
                max-width: 1100px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                gap: 0.4rem;
                font-size: 0.875rem;
            }
            .topbar-home {
                color: var(--color-text-muted);
                text-decoration: none;
                padding: 0.25rem 0.4rem;
                border-radius: 4px;
            }
            .topbar-home:hover {
                color: var(--color-text);
            }
            .topbar-crumb-sep {
                color: var(--color-text-muted);
                opacity: 0.6;
            }
            .topbar-crumb-static {
                color: var(--color-text-muted);
            }
            .topbar-crumb-current {
                font-family: "JetBrains Mono", "SF Mono", Monaco, monospace;
                font-size: 0.85rem;
                color: var(--color-text);
            }
            .topbar-spacer {
                flex: 1;
            }

            /* ---------- Chapter picker (dropdown / mobile sheet) ---------- */
            .chapter-picker {
                position: relative;
                display: inline-flex;
            }
            .chapter-picker-btn {
                display: inline-flex;
                align-items: center;
                gap: 0.35rem;
                background: transparent;
                border: 1px solid transparent;
                border-radius: 6px;
                padding: 0.2rem 0.4rem 0.2rem 0.5rem;
                color: var(--color-text);
                cursor: pointer;
                font: inherit;
            }
            .chapter-picker-btn:hover,
            .chapter-picker-btn[aria-expanded="true"] {
                background: color-mix(
                    in srgb,
                    var(--color-text) 8%,
                    transparent
                );
                border-color: var(--color-border);
            }
            .chapter-picker-label {
                font-family: "JetBrains Mono", "SF Mono", Monaco, monospace;
                font-size: 0.85rem;
            }
            .chapter-picker-chevron {
                color: var(--color-text-muted);
                transition: transform 0.15s ease;
            }
            .chapter-picker-btn[aria-expanded="true"] .chapter-picker-chevron {
                transform: rotate(180deg);
            }
            .chapter-picker-menu {
                position: absolute;
                top: calc(100% + 6px);
                left: 0;
                z-index: 950;
                min-width: 320px;
                max-width: min(420px, calc(100vw - 1rem));
                max-height: min(70vh, 28rem);
                overflow-y: auto;
                background: var(--color-background);
                color: var(--color-text);
                border: 1px solid var(--color-border);
                border-radius: 10px;
                box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
                padding: 0.35rem;
            }
            .chapter-picker-menu[hidden] {
                display: none;
            }
            .chapter-picker-sheet-header {
                /* Hidden on desktop; appears only in the mobile sheet. */
                display: none;
            }
            .chapter-picker-list {
                list-style: none;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
                gap: 1px;
            }
            .chapter-picker-item {
                display: grid;
                grid-template-columns: 2.25rem 1fr auto;
                align-items: center;
                gap: 0.5rem;
                padding: 0.45rem 0.6rem;
                border-radius: 6px;
                color: var(--color-text);
                text-decoration: none;
                font-size: 0.875rem;
                line-height: 1.25;
            }
            .chapter-picker-item:hover {
                background: color-mix(
                    in srgb,
                    var(--color-text) 8%,
                    transparent
                );
            }
            .chapter-picker-item.is-current {
                background: color-mix(
                    in srgb,
                    var(--color-primary) 12%,
                    transparent
                );
                color: var(--color-text);
            }
            .chapter-picker-num {
                font-family: "JetBrains Mono", "SF Mono", Monaco, monospace;
                font-size: 0.75rem;
                color: var(--color-text-muted);
                text-align: right;
            }
            .chapter-picker-item.is-current .chapter-picker-num {
                color: var(--color-primary);
                font-weight: 600;
            }
            .chapter-picker-title {
                color: inherit;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .chapter-picker-status {
                color: var(--color-text-muted);
                font-size: 0.8rem;
                min-width: 0.8rem;
                text-align: right;
            }

            /* Mobile: turn the popover into a bottom sheet so taps are
               easy and the list isn't clipped by the viewport. */
            @media (max-width: 640px) {
                .chapter-picker-menu {
                    position: fixed;
                    inset: auto 0 0 0;
                    top: auto;
                    left: 0;
                    right: 0;
                    width: 100%;
                    max-width: 100%;
                    max-height: 80vh;
                    border-radius: 14px 14px 0 0;
                    padding: 0.5rem 0.5rem 1rem;
                    box-shadow: 0 -16px 40px rgba(0, 0, 0, 0.35);
                    /* Sit above the (also-overlay) cheatsheet backdrop
                       isn't necessary; this is its own layer. */
                }
                .chapter-picker-menu::before {
                    /* Dim the page behind the sheet without an extra DOM
                       node: we paint a fixed pseudo-backdrop. */
                    content: "";
                    position: fixed;
                    inset: 0;
                    background: color-mix(in srgb, black 45%, transparent);
                    z-index: -1;
                }
                .chapter-picker-sheet-header {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    padding: 0.5rem 0.4rem 0.6rem;
                    font-weight: 600;
                    color: var(--color-text);
                    font-size: 0.95rem;
                    border-bottom: 1px solid var(--color-border);
                    margin-bottom: 0.4rem;
                }
                .chapter-picker-sheet-close {
                    background: transparent;
                    border: none;
                    color: var(--color-text-muted);
                    font-size: 1.5rem;
                    line-height: 1;
                    padding: 0.25rem 0.5rem;
                    cursor: pointer;
                }
                .chapter-picker-item {
                    padding: 0.7rem 0.6rem;
                    font-size: 0.95rem;
                }
            }
            .topbar-link {
                display: inline-flex;
                align-items: center;
                gap: 0.35rem;
                padding: 0.3rem 0.6rem;
                border-radius: 6px;
                font-size: 0.875rem;
                color: var(--color-text-muted);
                text-decoration: none;
                background: transparent;
                border: none;
                cursor: pointer;
                font-family: inherit;
            }
            .topbar-link:hover {
                color: var(--color-text);
                background: color-mix(
                    in srgb,
                    var(--color-text) 8%,
                    transparent
                );
            }
            .topbar-link svg {
                width: 0.95rem;
                height: 0.95rem;
            }

            /* ---------- Old in-page nav (admin/dashboard) ---------- */
            .nav-brand {
                font-size: 1.25rem;
                font-weight: 700;
                color: var(--color-text);
                text-decoration: none;
                display: inline-flex;
                align-items: center;
            }
            .nav-links {
                display: flex;
                gap: 1rem;
                align-items: center;
            }
            .nav-link {
                color: var(--color-text-muted);
                text-decoration: none;
                font-size: 0.95rem;
            }
            .nav-link:hover {
                color: var(--color-text);
            }

            .brand-logo {
                height: 28px;
                display: block;
                filter: var(--logo-filter);
            }

            /* ---------- Theme toggle (lives inside the top bar) ---------- */
            .theme-toggle {
                width: 1.9rem;
                height: 1.9rem;
                border-radius: 6px;
                border: 1px solid var(--color-border);
                background: transparent;
                color: var(--color-text);
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-left: 0.25rem;
            }
            .theme-toggle:hover {
                border-color: var(--color-text-muted);
            }
            .theme-toggle svg {
                width: 0.95rem;
                height: 0.95rem;
            }
            .theme-toggle .icon-sun {
                display: none;
            }
            .theme-toggle .icon-moon {
                display: inline-block;
            }
            html[data-theme="dark"] .theme-toggle .icon-sun {
                display: inline-block;
            }
            html[data-theme="dark"] .theme-toggle .icon-moon {
                display: none;
            }

            /* ---------- Code-container helpers (admin/dashboard) ---------- */
            .code-container {
                position: relative;
            }
            .copy-btn {
                position: absolute;
                top: 8px;
                right: 8px;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 4px;
                padding: 4px 8px;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                gap: 4px;
                color: var(--color-text);
                font-size: 0.8rem;
            }
            .copy-btn:hover {
                border-color: var(--color-text-muted);
            }
            .copy-btn svg {
                width: 14px;
                height: 14px;
            }

            /* ---------- Footer ---------- */
            .site-footer {
                border-top: 1px solid var(--color-border);
                padding: 1.5rem;
                background: var(--color-surface);
                color: var(--color-text-muted);
                font-size: 0.85rem;
            }
            .site-footer-inner {
                max-width: 1100px;
                margin: 0 auto;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 1rem;
                flex-wrap: wrap;
            }
            .site-footer .brand-logo {
                height: 22px;
            }
            .site-footer a {
                color: var(--color-text-muted);
                text-decoration: none;
            }
            .site-footer a:hover {
                color: var(--color-text);
                text-decoration: underline;
            }

            @media (max-width: 768px) {
                .container {
                    padding: 1rem 1rem 3rem;
                }
                .header h1 {
                    font-size: 1.75rem;
                }
                .stats {
                    grid-template-columns: 1fr;
                }
                .admin-table {
                    font-size: 0.875rem;
                }
                .topbar {
                    padding: 0 0.75rem;
                }
                .topbar-link span:not(.sr-only) {
                    /* Drop the labels on phones, keep just the icons. */
                    display: none;
                }
            }

            /* ---------- Cheatsheet modal ---------- */
            .cheatsheet-modal {
                position: fixed;
                inset: 0;
                z-index: 1000;
                display: none;
                align-items: flex-start;
                justify-content: center;
                padding: 2.5rem 1rem 1rem;
                background: color-mix(in srgb, black 55%, transparent);
                -webkit-backdrop-filter: blur(4px);
                backdrop-filter: blur(4px);
            }
            .cheatsheet-modal[data-open="true"] {
                display: flex;
            }
            .cheatsheet-modal-dialog {
                position: relative;
                width: min(1280px, 100%);
                max-height: calc(100vh - 3.5rem);
                display: flex;
                flex-direction: column;
                background: var(--color-background);
                color: var(--color-text);
                border: 1px solid var(--color-border);
                border-radius: 10px;
                box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
                overflow: hidden;
            }
            .cheatsheet-modal-header {
                display: flex;
                align-items: center;
                gap: 1rem;
                padding: 0.6rem 1rem;
                border-bottom: 1px solid var(--color-border);
                background: var(--color-surface);
                flex-shrink: 0;
            }
            .cheatsheet-modal-header h2 {
                margin: 0;
                font-size: 1rem;
            }
            .cheatsheet-modal-hint {
                margin-left: auto;
                font-size: 0.78rem;
                color: var(--color-text-muted);
            }
            .cheatsheet-modal-hint kbd {
                font-family: "JetBrains Mono", ui-monospace, monospace;
                font-size: 0.72rem;
                background: color-mix(in srgb, currentColor 12%, transparent);
                border: 1px solid
                    color-mix(in srgb, currentColor 25%, transparent);
                border-radius: 4px;
                padding: 1px 5px;
            }
            .cheatsheet-modal-close {
                background: transparent;
                border: 1px solid var(--color-border);
                color: inherit;
                border-radius: 6px;
                width: 28px;
                height: 28px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                font-size: 1rem;
                line-height: 1;
            }
            .cheatsheet-modal-close:hover {
                background: color-mix(in srgb, currentColor 8%, transparent);
            }
            .cheatsheet-modal-body {
                overflow-y: auto;
                padding: 0.75rem 1.25rem 1.25rem;
                background: var(--color-background);
            }
            /* Multi-column flow: sections snake across columns and the
               page becomes much denser. CSS columns honour `break-inside:
               avoid` so a single section (heading + table) stays
               together. */
            .cheatsheet-modal-body {
                column-width: 380px;
                column-gap: 1.25rem;
            }
            .cheatsheet-modal-body > h1 {
                column-span: all;
                margin: 0 0 0.4rem;
                font-size: 1.15rem;
            }
            .cheatsheet-modal-body > p {
                column-span: all;
                margin: 0 0 0.75rem;
                font-size: 0.85rem;
                color: var(--color-text-muted);
            }
            .cheatsheet-modal-body > h2 {
                font-size: 0.9rem;
                font-weight: 600;
                margin: 0 0 0.3rem;
                padding-bottom: 0.2rem;
                border-bottom: 1px solid var(--color-border);
                color: var(--color-text);
                break-after: avoid;
            }
            .cheatsheet-modal-body > h2,
            .cheatsheet-modal-body > table {
                break-inside: avoid;
            }
            .cheatsheet-modal-body > table {
                width: 100%;
                border-collapse: collapse;
                margin: 0 0 1rem;
                font-size: 0.78rem;
                table-layout: fixed;
            }
            .cheatsheet-modal-body > table th,
            .cheatsheet-modal-body > table td {
                border: none;
                border-bottom: 1px solid var(--color-border);
                padding: 0.25rem 0.45rem;
                text-align: left;
                vertical-align: top;
                background: transparent;
            }
            .cheatsheet-modal-body > table th {
                font-size: 0.7rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                color: var(--color-text-muted);
                background: transparent;
            }
            .cheatsheet-modal-body > table th:first-child,
            .cheatsheet-modal-body > table td:first-child {
                width: 45%;
                font-family: "JetBrains Mono", "SF Mono", Monaco, monospace;
                font-size: 0.75rem;
                white-space: normal;
                word-break: break-word;
            }
            .cheatsheet-modal-body > table td code,
            .cheatsheet-modal-body > table th code {
                font-size: inherit;
                padding: 0 2px;
                background: color-mix(
                    in srgb,
                    var(--color-text) 6%,
                    transparent
                );
                border-radius: 3px;
            }
            .cheatsheet-modal-body > table td:first-child code {
                background: transparent;
                padding: 0;
            }
            .cheatsheet-modal-body .cheatsheet-loading {
                column-span: all;
                color: var(--color-text-muted);
                font-style: italic;
            }
            @media (max-width: 640px) {
                .cheatsheet-modal {
                    padding: 0.5rem 0.5rem 0.5rem;
                }
                .cheatsheet-modal-dialog {
                    max-height: calc(100vh - 1rem);
                }
                .cheatsheet-modal-body {
                    column-width: auto;
                    columns: 1;
                }
            }
        </style>
        <script>
            // Apply the saved theme before paint to avoid a flash.
            (function () {
                try {
                    var t = localStorage.getItem("theme");
                    if (!t) {
                        t =
                            window.matchMedia &&
                            window.matchMedia("(prefers-color-scheme: dark)")
                                .matches
                                ? "dark"
                                : "light";
                    }
                    document.documentElement.setAttribute("data-theme", t);
                } catch (_) {
                    document.documentElement.setAttribute(
                        "data-theme",
                        "light",
                    );
                }
            })();
        </script>
    </head>
    <body>
        {% block topbar %}
        <header class="topbar" role="banner">
            <div class="topbar-inner">

                <a href="/" class="topbar-home">corrode</a>
                {% endblock %}
                <div class="topbar-spacer"></div>
                <a
                    class="topbar-link"
                    href="/playground"
                    title="Open the Rust scratchpad"
                >
                    <svg

                        aria-hidden="true"

                    </svg>
                    <span>Playground</span>
                </a>
                <a
                    class="topbar-link"

                    <svg

                <button

                        <line x1="4.2" y1="19.8" x2="6.3" y2="17.7" />

        {% endblock %} {% block content %}{% endblock %}

        <!-- Cheatsheet modal: lazy-loaded from /cheatsheet/fragment -->
        <div
            class="cheatsheet-modal"
            id="cheatsheet-modal"
            role="dialog"
            aria-modal="true"
            aria-labelledby="cheatsheet-modal-title"
            aria-hidden="true"
        >
            <div class="cheatsheet-modal-dialog">
                <div class="cheatsheet-modal-header">
                    <h2 id="cheatsheet-modal-title">Cheatsheet</h2>
                    <span class="cheatsheet-modal-hint">
                        <kbd>?</kbd> to toggle &middot; <kbd>Esc</kbd> to close
                    </span>
                    <button
                        type="button"
                        class="cheatsheet-modal-close"
                        aria-label="Close cheatsheet"
                        data-cheatsheet-close
                    >
                        ×
                    </button>

        <footer class="site-footer">

                        >corrode.dev</a
                    >
                    &middot;
                    <a
                        href="https://github.com/corrode/course"
                        target="_blank"
                        rel="noopener"
                        >source</a
                    >
                </div>

        <script>
            // Toggle between light and dark.
            function toggleTheme() {
                var current =
                    document.documentElement.getAttribute("data-theme") ||
                    "light";
                var next = current === "dark" ? "light" : "dark";
                document.documentElement.setAttribute("data-theme", next);
                try {
                    localStorage.setItem("theme", next);
                } catch (_) {}
            }

            // Back-compat shim for any callers still using setTheme(name).
            function setTheme(theme) {
                var t = theme === "dark" || theme === "light" ? theme : "light";
                document.documentElement.setAttribute("data-theme", t);
                try {
                    localStorage.setItem("theme", t);
                } catch (_) {}
            }

            // ---- Clipboard helpers used by admin/dashboard pages ----
            async function copyToClipboard(text, button) {
                try {
                    await navigator.clipboard.writeText(text);
                    if (button) {
                        var orig = button.innerHTML;
                        button.innerHTML = "Copied!";
                        setTimeout(function () {
                            button.innerHTML = orig;
                        }, 1500);
                    }
                } catch (err) {
                    console.error("Failed to copy:", err);
                }
            }
            function copyCodeFromElement(codeElement) {
                var text = codeElement.textContent;
                var container = codeElement.closest(".code-container");
                var button = container
                    ? container.querySelector(".copy-btn")
                    : null;
                copyToClipboard(text, button);
            }
            function openCodeInPlayground(codeElement, button, title) {
                openInRustPlayground(
                    codeElement.textContent,
                    button,
                    title || "Rust Code",
                );
            }
            function openInRustPlayground(code, button, _title) {
                var encoded = encodeURIComponent(code);
                var url =
                    "https://play.rust-lang.org/?version=stable&mode=debug&edition=2024&code=" +
                    encoded;
                window.open(url, "_blank");
            }

            // ---- Chapter picker (breadcrumb dropdown) ----
            (function () {
                var picker = document.querySelector("[data-chapter-picker]");
                if (!picker) return;
                var btn = picker.querySelector("[data-chapter-picker-toggle]");
                var menu = picker.querySelector(".chapter-picker-menu");
                var closeBtn = picker.querySelector(
                    "[data-chapter-picker-close]",
                );
                if (!btn || !menu) return;

                function isOpen() {
                    return btn.getAttribute("aria-expanded") === "true";
                }
                function open() {
                    if (isOpen()) return;
                    btn.setAttribute("aria-expanded", "true");
                    menu.hidden = false;
                    // Scroll the current item into view inside the menu.
                    var current = menu.querySelector(
                        ".chapter-picker-item.is-current",
                    );
                    if (current && current.scrollIntoView) {
                        current.scrollIntoView({ block: "nearest" });
                    }
                    // Focus the current item (or the first) for keyboard
                    // navigation.
                    var focusTarget =
                        current || menu.querySelector(".chapter-picker-item");
                    if (focusTarget) focusTarget.focus({ preventScroll: true });
                    document.addEventListener("click", onDocClick, true);
                    document.addEventListener("keydown", onKeyDown, true);
                }
                function close() {
                    if (!isOpen()) return;
                    btn.setAttribute("aria-expanded", "false");
                    menu.hidden = true;
                    document.removeEventListener("click", onDocClick, true);
                    document.removeEventListener("keydown", onKeyDown, true);
                }
                function toggle() {
                    if (isOpen()) close();
                    else open();
                }
                function onDocClick(e) {
                    if (picker.contains(e.target)) return;
                    close();
                }
                function onKeyDown(e) {
                    if (e.key === "Escape") {
                        e.preventDefault();
                        close();
                        btn.focus();
                        return;
                    }
                    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
                        var items = Array.prototype.slice.call(
                            menu.querySelectorAll(".chapter-picker-item"),
                        );
                        if (!items.length) return;
                        var idx = items.indexOf(document.activeElement);
                        var next;
                        if (e.key === "ArrowDown") {
                            next = items[(idx + 1) % items.length];
                        } else {
                            next =
                                items[(idx - 1 + items.length) % items.length];
                        }
                        e.preventDefault();
                        if (next) next.focus();
                    }
                }

                btn.addEventListener("click", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    toggle();
                });
                if (closeBtn) {
                    closeBtn.addEventListener("click", function (e) {
                        e.preventDefault();
                        close();
                    });
                }
            })();

            // ---- Cheatsheet modal ----
            (function () {
                var modal = document.getElementById("cheatsheet-modal");
                if (!modal) return;
                var body = modal.querySelector("[data-cheatsheet-body]");
                var loaded = false;
                var loading = false;
                var lastFocus = null;

                function escapeHtml(s) {
                    return s
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;");
                }

                async function highlight() {
                    try {
                        var mods = await Promise.all([
                            import("https://esm.sh/*@lezer/rust@1.0.2"),
                            import("https://esm.sh/*@lezer/highlight@1.2.0"),
                        ]);
                        var parser = mods[0].parser;
                        var highlightTree = mods[1].highlightTree;
                        var classHighlighter = mods[1].classHighlighter;
                        body.querySelectorAll("pre > code").forEach(
                            function (el) {
                                var cls = el.className || "";
                                if (cls && cls.indexOf("language-rust") === -1)
                                    return;
                                var code = el.textContent;
                                var tree = parser.parse(code);
                                var out = "";
                                var pos = 0;
                                highlightTree(
                                    tree,
                                    classHighlighter,
                                    function (from, to, klass) {
                                        if (from > pos)
                                            out += escapeHtml(
                                                code.slice(pos, from),
                                            );
                                        out +=
                                            '<span class="' +
                                            klass +
                                            '">' +
                                            escapeHtml(code.slice(from, to)) +
                                            "</span>";
                                        pos = to;
                                    },
                                );
                                if (pos < code.length)
                                    out += escapeHtml(code.slice(pos));
                                el.innerHTML = out;
                            },
                        );
                    } catch (e) {
                        console.warn("cheatsheet highlight failed", e);
                    }
                }

                async function ensureLoaded() {
                    if (loaded || loading) return;
                    loading = true;
                    try {
                        var resp = await fetch("/cheatsheet/fragment", {
                            credentials: "same-origin",
                        });
                        if (!resp.ok) throw new Error("HTTP " + resp.status);
                        body.innerHTML = await resp.text();
                        loaded = true;
                        highlight();
                    } catch (e) {
                        body.innerHTML =
                            '<p class="cheatsheet-loading">Could not load cheatsheet (' +
                            escapeHtml(String(e)) +
                            '). Try the <a href="/cheatsheet">full page</a>.</p>';
                    } finally {
                        loading = false;
                    }
                }

                function open() {
                    lastFocus = document.activeElement;
                    modal.setAttribute("data-open", "true");
                    modal.setAttribute("aria-hidden", "false");
                    document.body.style.overflow = "hidden";
                    ensureLoaded();
                    var closeBtn = modal.querySelector(
                        "[data-cheatsheet-close]",
                    );
                    if (closeBtn) closeBtn.focus();
                }

                function close() {
                    modal.removeAttribute("data-open");
                    modal.setAttribute("aria-hidden", "true");
                    document.body.style.overflow = "";
                    if (lastFocus && typeof lastFocus.focus === "function") {
                        lastFocus.focus();
                    }
                }

                function toggle() {
                    if (modal.getAttribute("data-open") === "true") close();
                    else open();
                }

                // Wire toggle buttons.
                document
                    .querySelectorAll("[data-cheatsheet-toggle]")
                    .forEach(function (el) {
                        el.addEventListener("click", function (e) {
                            e.preventDefault();
                            toggle();
                        });
                    });
                modal
                    .querySelectorAll("[data-cheatsheet-close]")
                    .forEach(function (el) {
                        el.addEventListener("click", close);
                    });
                // Click on backdrop closes.
                modal.addEventListener("click", function (e) {
                    if (e.target === modal) close();
                });

                // Keyboard: `?` toggles, `Esc` closes. Ignore when typing
                // in inputs / textareas / contenteditable / CodeMirror.
                document.addEventListener("keydown", function (e) {
                    var t = e.target;
                    var inEditable =
                        t &&
                        (t.tagName === "INPUT" ||
                            t.tagName === "TEXTAREA" ||
                            t.isContentEditable ||
                            (t.closest && t.closest(".cm-editor")));
                    if (
                        e.key === "Escape" &&
                        modal.getAttribute("data-open") === "true"
                    ) {
                        e.preventDefault();
                        close();
                        return;
                    }
                    if (inEditable) return;
                    if (e.key === "?" || (e.key === "/" && e.shiftKey)) {
                        e.preventDefault();
                        toggle();
                    }
                });
            })();
        </script>
    </body>
</html>
