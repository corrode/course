<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}corrode Rust Course{% endblock %}</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            /* ---------- Local fonts (served from /static/fonts) ---------- */
            @font-face {
                font-family: "Happy Headline";
                src: url("/static/fonts/Happy-Headline.woff2") format("woff2");
                font-weight: 400 900;
                font-style: normal;
                font-display: swap;
            }
            @font-face {
                font-family: "JetBrains Mono";
                src: url("/static/fonts/JetBrainsMono-Regular.woff2")
                    format("woff2");
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }
            /* ---------- Theme tokens ---------- */
            :root {
                /* GitHub Primer — light */
                --color-background: #ffffff;
                --color-surface: #f6f8fa;
                --color-primary: #0969da;
                --color-primary-muted: #0550ae;
                --color-primary-rgb: 9, 105, 218;
                --color-text: #1f2328;
                --color-text-muted: #59636e;
                --color-border: #d1d9e0;
                --color-input-bg: #ffffff;
                --color-input-border: #d1d9e0;
                --color-success: #1a7f37;
                --color-warning: #9a6700;
                --color-error: #d1242f;
                --logo-filter: invert(0%);
            }

            html[data-theme="dark"] {
                /* GitHub Primer — dark */
                --color-background: #0d1117;
                --color-surface: #151b23;
                --color-primary: #4493f8;
                --color-primary-muted: #1f6feb;
                --color-primary-rgb: 68, 147, 248;
                --color-text: #f0f6fc;
                --color-text-muted: #9198a1;
                --color-border: #3d444d;
                --color-input-bg: #0d1117;
                --color-input-border: #3d444d;
                --color-success: #3fb950;
                --color-warning: #d29922;
                --color-error: #f85149;
                --logo-filter: invert(100%);
            }

            /* ---------- Reset ---------- */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    "Helvetica Neue",
                    sans-serif;
                background-color: var(--color-background);
                color: var(--color-text);
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                /* Leave room for the fixed top bar. */
                padding-top: 3.25rem;
            }

            h1,
            h2,
            h3,
            h4,
            h5,
            h6,
            .header h1,
            .exercise-title {
                font-family:
                    "Happy Headline",
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                letter-spacing: -0.01em;
            }

            code,
            pre,
            kbd,
            samp,
            .cm-editor,
            .cm-content,
            .code-block {
                font-family:
                    "JetBrains Mono", "SF Mono", Monaco, Menlo, Consolas,
                    monospace;
            }

            /* ---------- Layout ---------- */
            .container {
                width: 100%;
                max-width: 1100px;
                margin: 0 auto;
                padding: 1.5rem 1.5rem 4rem;
                flex: 1 0 auto;
            }

            .header {
                text-align: center;
                margin-bottom: 3rem;
            }
            .header h1 {
                font-size: 2.5rem;
                font-weight: 700;
                letter-spacing: -0.01em;
                color: var(--color-text);
                margin-bottom: 0.5rem;
            }
            .header p {
                font-size: 1.05rem;
                color: var(--color-text-muted);
            }

            /* ---------- Cards / forms / buttons (used by other pages) ---------- */
            .card {
                background-color: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 8px;
                padding: 1.5rem;
                margin-bottom: 1.25rem;
            }
            .form-group {
                margin-bottom: 1.25rem;
            }
            .form-group label {
                display: block;
                margin-bottom: 0.4rem;
                font-weight: 600;
                color: var(--color-text);
            }
            .form-control {
                width: 100%;
                padding: 0.7rem 1rem;
                background-color: var(--color-input-bg);
                border: 1px solid var(--color-input-border);
                border-radius: 6px;
                color: var(--color-text);
                font-size: 1rem;
            }
            .form-control:focus {
                outline: none;
                border-color: var(--color-primary);
            }
            .form-control::placeholder {
                color: var(--color-text-muted);
            }

            .btn {
                display: inline-block;
                padding: 0.6rem 1.1rem;
                background-color: var(--color-primary);
                color: #fff;
                text-decoration: none;
                border: 1px solid var(--color-primary);
                border-radius: 6px;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
            }
            .btn:hover {
                background-color: var(--color-primary-muted);
            }
            .btn-secondary {
                background-color: var(--color-surface);
                color: var(--color-text);
                border: 1px solid var(--color-border);
            }
            .btn-secondary:hover {
                background-color: var(--color-background);
                border-color: var(--color-text-muted);
                color: var(--color-text);
            }
            .btn-success {
                background-color: var(--color-success);
                border-color: var(--color-success);
                color: #fff;
            }
            .btn-success:hover {
                /* Slight darken on hover; falls back to filter so we don't
                   need a separate token per theme. */
                filter: brightness(0.92);
            }

            .exercise-list {
                display: grid;
            }
            .exercise-item {
                display: flex;
                align-items: center;
                padding: 1rem;
                background-color: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 6px;
            }
            .exercise-item:hover {
                border-color: var(--color-primary);
            }
            .exercise-status {
                font-size: 1.25rem;
                margin-right: 1rem;
            }
            .exercise-name {
                font-weight: 500;
                color: var(--color-text);
                font-family: "SF Mono", Monaco, monospace;
            }
            .status-completed {
                color: var(--color-success);
            }
            .status-perfected {
                color: var(--color-warning);
            }
            .status-pending {
                color: var(--color-text-muted);
            }

            .stats {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 1rem;
                margin-bottom: 1.5rem;
            }
            .stat-card {
                text-align: center;
                padding: 1rem;
                background-color: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 8px;
            }
            .stat-number {
                font-size: 1.75rem;
                font-weight: 700;
                color: var(--color-primary);
                display: block;
            }
            .stat-label {
                color: var(--color-text-muted);
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .admin-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 1rem;
            }
            .admin-table th,
            .admin-table td {
                padding: 0.6rem 0.75rem;
                text-align: left;
                border-bottom: 1px solid var(--color-border);
            }
            .admin-table th {
                background-color: var(--color-surface);
                font-weight: 600;
                color: var(--color-text);
            }
            .admin-table td {
                color: var(--color-text-muted);
            }

            .code-block {
                background-color: #1e1e2e;
                color: #cdd6f4;
                border: 1px solid #313244;
                border-radius: 12px;
                padding: 1rem;
                margin: 1rem 0;
                overflow-x: auto;
                font-family: "SF Mono", Monaco, monospace;
                font-size: 0.875rem;
                line-height: 1.5;
            }

            /* ---------- Top bar / brand (kept for non-exercise pages) ---------- */
            .nav {
                /* Per-page in-content nav blocks are superseded by the
                   global fixed top bar below. Keep the rule for backwards
                   compatibility, but hide the markup wherever it appears. */
                display: none !important;
            }

            /* ---------- Global fixed top bar ---------- */
            .topbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 900;
                height: 3.25rem;
                background: var(--color-surface);
                border-bottom: 1px solid var(--color-border);
                display: flex;
                align-items: center;
                padding: 0 1.5rem;
                gap: 1rem;
                backdrop-filter: saturate(140%) blur(8px);
                -webkit-backdrop-filter: saturate(140%) blur(8px);
            }
            .topbar-inner {
                width: 100%;
                max-width: 1100px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                gap: 1.25rem;
            }
            .topbar-brand {
                display: inline-flex;
                align-items: center;
                text-decoration: none;
                color: var(--color-text);
            }
            .topbar-brand .brand-logo {
                height: 22px;
                filter: var(--logo-filter);
            }
            .topbar-links {
                display: flex;
                align-items: center;
                gap: 0.25rem;
                margin-left: auto;
            }
            .topbar-link {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                padding: 0.35rem 0.7rem;
                border-radius: 6px;
                font-size: 0.9rem;
                color: var(--color-text-muted);
                text-decoration: none;
            }
            .topbar-link:hover {
                color: var(--color-text);
                background: color-mix(
                    in srgb,
                    var(--color-text) 8%,
                    transparent
                );
            }
            .topbar-link svg {
                width: 1rem;
                height: 1rem;
            }

            /* ---------- Old in-page nav (admin/dashboard) ---------- */
            .nav-brand {
                font-size: 1.25rem;
                font-weight: 700;
                color: var(--color-text);
                text-decoration: none;
                display: inline-flex;
                align-items: center;
            }
            .nav-links {
                display: flex;
                gap: 1rem;
                align-items: center;
            }
            .nav-link {
                color: var(--color-text-muted);
                text-decoration: none;
                font-size: 0.95rem;
            }
            .nav-link:hover {
                color: var(--color-text);
            }

            .brand-logo {
                height: 28px;
                display: block;
                filter: var(--logo-filter);
            }

            /* ---------- Theme toggle (lives inside the top bar) ---------- */
            .theme-toggle {
                width: 2.25rem;
                height: 2.25rem;
                border-radius: 8px;
                border: 1px solid var(--color-border);
                background: var(--color-surface);
                color: var(--color-text);
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-left: 0.25rem;
            }
            .theme-toggle:hover {
                border-color: var(--color-text-muted);
            }
            .theme-toggle svg {
                width: 1.1rem;
                height: 1.1rem;
            }
            .theme-toggle .icon-sun {
                display: none;
            }
            .theme-toggle .icon-moon {
                display: inline-block;
            }
            html[data-theme="dark"] .theme-toggle .icon-sun {
                display: inline-block;
            }
            html[data-theme="dark"] .theme-toggle .icon-moon {
                display: none;
            }

            /* ---------- Code-container helpers (admin/dashboard) ---------- */
            .code-container {
                position: relative;
            }
            .copy-btn {
                position: absolute;
                top: 8px;
                right: 8px;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 4px;
                padding: 4px 8px;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                gap: 4px;
                color: var(--color-text);
                font-size: 0.8rem;
            }
            .copy-btn:hover {
                border-color: var(--color-text-muted);
            }
            .copy-btn svg {
                width: 14px;
                height: 14px;
            }

            /* ---------- Footer ---------- */
            .site-footer {
                border-top: 1px solid var(--color-border);
                padding: 1.5rem;
                background: var(--color-surface);
                color: var(--color-text-muted);
                font-size: 0.85rem;
            }
            .site-footer-inner {
                max-width: 1100px;
                margin: 0 auto;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 1rem;
                flex-wrap: wrap;
            }
            .site-footer .brand-logo {
                height: 22px;
            }
            .site-footer a {
                color: var(--color-text-muted);
                text-decoration: none;
            }
            .site-footer a:hover {
                color: var(--color-text);
                text-decoration: underline;
            }

            @media (max-width: 768px) {
                .container {
                    padding: 1rem 1rem 3rem;
                }
                .header h1 {
                    font-size: 1.75rem;
                }
                .stats {
                    grid-template-columns: 1fr;
                }
                .admin-table {
                    font-size: 0.875rem;
                }
                .topbar {
                    padding: 0 0.75rem;
                }
                .topbar-link span:not(.sr-only) {
                    /* Drop the labels on phones, keep just the icons. */
                    display: none;
                }
            }
        </style>
        <script>
            // Apply the saved theme before paint to avoid a flash.
            (function () {
                try {
                    var t = localStorage.getItem("theme");
                    if (!t) {
                        t =
                            window.matchMedia &&
                            window.matchMedia("(prefers-color-scheme: dark)")
                                .matches
                                ? "dark"
                                : "light";
                    }
                    document.documentElement.setAttribute("data-theme", t);
                } catch (_) {
                    document.documentElement.setAttribute(
                        "data-theme",
                        "light",
                    );
                }
            })();
        </script>
    </head>
    <body>
        <header class="topbar" role="banner">
            <div class="topbar-inner">
                <a href="/" class="topbar-brand" aria-label="corrode home">
                    <img
                        src="/static/assets/corrode-logo.svg"
                        alt="corrode"
                        class="brand-logo"
                    />
                </a>
                <nav class="topbar-links" aria-label="Primary">
                    <a
                        class="topbar-link"
                        href="/playground"
                        title="Open the Rust scratchpad"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        <span>Playground</span>
                    </a>
                    <a
                        class="topbar-link"
                        href="/cheatsheet"
                        title="Quick reference of Rust syntax"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <path
                                d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"
                            ></path>
                            <path
                                d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"
                            ></path>
                        </svg>
                        <span>Cheatsheet</span>
                    </a>
                    <button
                        type="button"
                        class="theme-toggle"
                        id="theme-toggle"
                        aria-label="Toggle dark mode"
                        title="Toggle dark mode"
                        onclick="toggleTheme()"
                    >
                        <svg
                            class="icon-moon"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <path
                                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                                fill="currentColor"
                                stroke="none"
                            />
                        </svg>
                        <svg
                            class="icon-sun"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <circle
                                cx="12"
                                cy="12"
                                r="4"
                                fill="currentColor"
                                stroke="none"
                            />
                            <line x1="12" y1="2" x2="12" y2="5" />
                            <line x1="12" y1="19" x2="12" y2="22" />
                            <line x1="2" y1="12" x2="5" y2="12" />
                            <line x1="19" y1="12" x2="22" y2="12" />
                            <line x1="4.2" y1="4.2" x2="6.3" y2="6.3" />
                            <line x1="17.7" y1="17.7" x2="19.8" y2="19.8" />
                            <line x1="4.2" y1="19.8" x2="6.3" y2="17.7" />
                            <line x1="17.7" y1="6.3" x2="19.8" y2="4.2" />
                        </svg>
                    </button>
                </nav>
            </div>
        </header>

        {% block content %}{% endblock %}

        <footer class="site-footer">
            <div class="site-footer-inner">
                <a href="/" aria-label="corrode home">
                    <img
                        src="/static/assets/corrode-logo.svg"
                        alt="corrode"
                        class="brand-logo"
                    />
                </a>
                <div>
                    Hands-on Rust exercises &middot;
                    <a href="https://corrode.dev" target="_blank" rel="noopener"
                        >corrode.dev</a
                    >
                    &middot;
                    <a
                        href="https://github.com/corrode/course"
                        target="_blank"
                        rel="noopener"
                        >source</a
                    >
                </div>
            </div>
        </footer>

        <script>
            // Toggle between light and dark.
            function toggleTheme() {
                var current =
                    document.documentElement.getAttribute("data-theme") ||
                    "light";
                var next = current === "dark" ? "light" : "dark";
                document.documentElement.setAttribute("data-theme", next);
                try {
                    localStorage.setItem("theme", next);
                } catch (_) {}
            }

            // Back-compat shim for any callers still using setTheme(name).
            function setTheme(theme) {
                var t = theme === "dark" || theme === "light" ? theme : "light";
                document.documentElement.setAttribute("data-theme", t);
                try {
                    localStorage.setItem("theme", t);
                } catch (_) {}
            }

            // ---- Clipboard helpers used by admin/dashboard pages ----
            async function copyToClipboard(text, button) {
                try {
                    await navigator.clipboard.writeText(text);
                    if (button) {
                        var orig = button.innerHTML;
                        button.innerHTML = "Copied!";
                        setTimeout(function () {
                            button.innerHTML = orig;
                        }, 1500);
                    }
                } catch (err) {
                    console.error("Failed to copy:", err);
                }
            }
            function copyCodeFromElement(codeElement) {
                var text = codeElement.textContent;
                var container = codeElement.closest(".code-container");
                var button = container
                    ? container.querySelector(".copy-btn")
                    : null;
                copyToClipboard(text, button);
            }
            function openCodeInPlayground(codeElement, button, title) {
                openInRustPlayground(
                    codeElement.textContent,
                    button,
                    title || "Rust Code",
                );
            }
            function openInRustPlayground(code, button, _title) {
                var encoded = encodeURIComponent(code);
                var url =
                    "https://play.rust-lang.org/?version=stable&mode=debug&edition=2024&code=" +
                    encoded;
                window.open(url, "_blank");
            }
        </script>
    </body>
</html>
