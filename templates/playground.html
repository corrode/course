{% extends "base.html" %} {% block title %}Playground | corrode Rust Course{%
endblock %} {% block content %}
<div class="container">
    <div class="exercise-header">
        <h1 class="exercise-title">Rust Playground</h1>
    </div>

    <div class="chapter-prose exercise-prose">
        <p>
            Code here is saved to your browser's local storage automatically.
            Close the tab and come back; it'll still be there.
        </p>
    </div>

    <section
        class="exercise-section"
        data-step-id="playground"
        data-exercise-key="playground"
    >
        <div class="exercise-section-head">
            <div></div>
            <div class="exercise-actions">
                <span
                    data-role="action-status"
                    class="action-status"
                    aria-live="polite"
                ></span>
                <button
                    type="button"
                    class="btn btn-secondary btn-reset"
                    data-role="reset-btn"
                    title="Replace the buffer with the starter snippet"
                >
                    Reset
                </button>
                <button
                    type="button"
                    class="btn btn-secondary btn-icon actions-cluster-start"
                    data-role="fullscreen-btn"
                    title="Toggle fullscreen editor (Esc to exit)"
                    aria-pressed="false"
                    aria-label="Toggle fullscreen editor"
                >
                    <svg
                        class="icon-fullscreen-enter"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <path d="M4 9V4h5" />
                        <path d="M20 9V4h-5" />
                        <path d="M4 15v5h5" />
                        <path d="M20 15v5h-5" />
                    </svg>
                    <svg
                        class="icon-fullscreen-exit"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <path d="M9 4v5H4" />
                        <path d="M15 4v5h5" />
                        <path d="M9 20v-5H4" />
                        <path d="M15 20v-5h5" />
                    </svg>
                </button>
                <button
                    type="button"
                    class="btn btn-secondary"
                    data-role="vim-btn"
                    title="Toggle Vim keybindings"
                    aria-pressed="false"
                >
                    Vim: off
                </button>
                <button
                    type="button"
                    class="btn btn-secondary"
                    data-role="format-btn"
                    title="Format the code with rustfmt"
                >
                    Format
                </button>
                <button
                    type="button"
                    class="btn"
                    data-role="run-btn"
                    title="Run on play.rust-lang.org (⌘/Ctrl+Enter)"
                >
                    ▶ Run
                </button>
            </div>
        </div>

        <div style="position: relative">
            <textarea
                data-role="editor-fallback"
                spellcheck="false"
                style="
                    width: 100%;
                    min-height: 28rem;
                    font-family:
                        &quot;JetBrains Mono&quot;, &quot;SF Mono&quot;, Monaco,
                        monospace;
                    font-size: 0.9rem;
                    padding: 1rem;
                    border: 1px solid var(--color-border);
                    border-radius: 12px;
                    background-color: var(--color-background);
                    color: var(--color-text);
                    resize: vertical;
                "
            >
{{ starter }}</textarea
            >
            <div data-role="editor-mount" style="display: none"></div>
        </div>

        <div
            data-role="run-status-row"
            style="
                margin-top: 0.75rem;
                min-height: 1.2rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            "
        >
            <span
                data-role="run-spinner"
                class="run-spinner"
                aria-hidden="true"
                style="display: none"
            ></span>
            <span
                data-role="run-status"
                style="color: var(--color-text-muted); font-size: 0.9rem"
                aria-live="polite"
            ></span>
        </div>

        <div data-role="output-panel" style="display: none; margin-top: 1rem">
            <h3 style="margin: 0 0 0.5rem 0; font-size: 1rem">Output</h3>
            <pre
                data-role="output-stderr"
                style="
                    margin: 0;
                    padding: 0.85rem 1rem;
                    background-color: var(--color-background);
                    border: 1px solid var(--color-border);
                    border-radius: 12px;
                    overflow-x: auto;
                    font-family:
                        &quot;JetBrains Mono&quot;, &quot;SF Mono&quot;, Monaco,
                        monospace;
                    font-size: 0.8rem;
                    white-space: pre-wrap;
                "
            ></pre>
        </div>
    </section>
</div>

<script type="module">
    // Playground scratchpad. The CodeMirror mount, button wiring, draft
    // persistence (via `features.draftKey`), and fallback path all live
    // in `static/js/inline-editor.js`. The `corrode:playground:draft`
    // key matches the previous standalone STORAGE_KEY so users keep
    // their existing scratchpad contents across this refactor.
    import("/static/js/inline-editor.js")
        .then(({ mountInlineEditor }) => {
            const section = document.querySelector(
                '.exercise-section[data-step-id="playground"]',
            );
            if (!section) return;
            const fallback = section.querySelector(
                '[data-role="editor-fallback"]',
            );
            mountInlineEditor(section, {
                starter: fallback ? fallback.value : "",
                slug: "playground",
                features: {
                    vim: true,
                    draftKey: "corrode:playground:draft",
                    submit: null,
                    testResults: false,
                    copyButton: false,
                    urlPlugin: false,
                    syntaxHighlightOutput: false,
                    runWithoutTests: true,
                },
            });
        })
        .catch((err) => {
            console.error("inline-editor module failed to load:", err);
        });

    // Fullscreen toggle. Pure CSS class swap on the section (no
    // Fullscreen API): more predictable, doesn't fight the browser's
    // own keyboard handling, and survives an unintended reload because
    // the CodeMirror mount stays where it is in the DOM.
    (function wireFullscreen() {
        const section = document.querySelector(
            '.exercise-section[data-step-id="playground"]',
        );
        const btn =
            section && section.querySelector('[data-role="fullscreen-btn"]');
        if (!section || !btn) return;
        const setState = (on) => {
            section.classList.toggle("is-fullscreen", on);
            document.body.classList.toggle("playground-fullscreen", on);
            btn.setAttribute("aria-pressed", on ? "true" : "false");
            btn.title = on
                ? "Exit fullscreen (Esc)"
                : "Toggle fullscreen editor (Esc to exit)";
        };
        btn.addEventListener("click", () =>
            setState(!section.classList.contains("is-fullscreen")),
        );
        document.addEventListener("keydown", (e) => {
            if (
                e.key === "Escape" &&
                section.classList.contains("is-fullscreen")
            ) {
                setState(false);
            }
        });
    })();
</script>

<style>
    .exercise-header {
        margin: 1rem 0 1.5rem;
    }
    .chapter-eyebrow {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-text-muted);
        margin-bottom: 0.4rem;
    }
    .exercise-title {
        font-size: 2rem;
    }
    .exercise-section {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 16px;
        padding: 1.5rem;
        margin-top: 1.5rem;
    }
    .exercise-section-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
    }
    .section-eyebrow {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-text-muted);
    }
    .section-title {
        margin: 0;
        font-size: 1.1rem;
    }
    .exercise-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
    }

    #run-spinner,
    .run-spinner {
        width: 0.9rem;
        height: 0.9rem;
        border: 2px solid var(--color-border);
        border-top-color: var(--color-primary);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* On the playground, strip the section card chrome (background,
       border, padding) so the editor itself reads as the page's
       primary canvas instead of a small panel nested inside one. */
    .exercise-section[data-step-id="playground"] {
        background: transparent;
        border: 0;
        padding: 0;
    }

    /* Give the editor a comfortable default size and let the rest of
       the page (status row, output panel) flow naturally underneath
       it. We intentionally avoid pinning the editor to the viewport
       height: that broke fullscreen (the !important leaked in and
       overlapped the output) and made the output panel feel detached
       from the editor in the normal layout. */
    .exercise-section[data-step-id="playground"] .cm-editor {
        min-height: 28rem;
    }
    .exercise-section[data-step-id="playground"] [data-role="editor-fallback"] {
        min-height: 28rem;
    }

    /* Visually separate the destructive Reset from the helpful
       Vim/Format/Run cluster on its right. */
    .exercise-actions .actions-cluster-start {
        margin-left: 1.25rem;
    }
    .btn.btn-reset {
        color: var(--color-text-muted);
    }
    .btn.btn-reset:hover {
        color: var(--color-text);
    }

    /* Icon-only toolbar button: square, same height as sibling `.btn`s
       (2.25rem) so it lines up with Vim / Format / Run. */
    .btn.btn-icon {
        width: 2.25rem;
        padding: 0;
    }
    .btn.btn-icon svg {
        width: 1.05rem;
        height: 1.05rem;
    }
    .btn.btn-icon .icon-fullscreen-exit {
        display: none;
    }
    .exercise-section.is-fullscreen .btn.btn-icon .icon-fullscreen-enter {
        display: none;
    }
    .exercise-section.is-fullscreen .btn.btn-icon .icon-fullscreen-exit {
        display: inline;
    }

    /* Fullscreen mode: pin the section to the viewport and let the
       CodeMirror mount stretch into the remaining vertical space.
       `body.playground-fullscreen` hides the topbar so the editor
       really fills the window. */
    .exercise-section.is-fullscreen {
        position: fixed;
        inset: 0;
        z-index: 1000;
        margin: 0;
        border-radius: 0;
        border: 0;
        padding: 1rem 1.25rem;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--color-background);
    }
    .exercise-section.is-fullscreen > div[style*="position: relative"] {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
    }
    .exercise-section.is-fullscreen [data-role="editor-mount"],
    .exercise-section.is-fullscreen [data-role="editor-fallback"] {
        flex: 1 1 auto;
        min-height: 0;
        height: 100%;
    }
    .exercise-section.is-fullscreen .cm-editor {
        height: 100%;
        min-height: 0;
    }
    .exercise-section.is-fullscreen .cm-scroller {
        height: 100%;
        overflow: auto;
    }
    .exercise-section.is-fullscreen [data-role="output-panel"] {
        flex: 0 0 auto;
        max-height: 30vh;
        overflow: auto;
    }
    body.playground-fullscreen {
        overflow: hidden;
    }
    body.playground-fullscreen .topbar,
    body.playground-fullscreen header.topbar {
        display: none;
    }
</style>
{% endblock %}
