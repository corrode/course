# Per-chapter UI knobs. See ChapterDirectives in src/exercises.rs and
# the registries in templates/exercise.html.
#
# Note: this file is hidden by default in most file viewers because of
# the leading dot. To list it: `ls -a` (Unix), or enable "show hidden
